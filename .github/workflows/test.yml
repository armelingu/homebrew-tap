name: brew test-bot

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: brew-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-audit:
    name: Style + audit
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          path: homebrew-tap

      - name: Tap the local checkout
        run: |
          brew tap armelingu/tap "$PWD/homebrew-tap"

      - name: brew style
        run: brew style --display-cop-names armelingu/tap

      - name: brew audit (online, new-formula rules relaxed)
        run: brew audit --tap=armelingu/tap --online --git

  install-and-test:
    name: Build from source + brew test
    runs-on: macos-latest
    timeout-minutes: 30
    # Only run the expensive build on PRs and manual dispatches. On push
    # to `main` we trust that the formula already passed via PR CI.
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          path: homebrew-tap

      - name: Tap the local checkout
        run: |
          brew tap armelingu/tap "$PWD/homebrew-tap"

      - name: brew install --build-from-source --verbose mac-manager
        run: brew install --build-from-source --verbose armelingu/tap/mac-manager

      - name: brew test mac-manager
        run: brew test --verbose armelingu/tap/mac-manager

      - name: brew uninstall mac-manager
        if: always()
        run: brew uninstall --force mac-manager
