name: brew test-bot

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: brew-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-audit:
    name: Style + audit
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Checkout tap
        uses: actions/checkout@v4

      - name: brew style (per formula)
        run: |
          for f in Formula/*.rb; do
            echo "::group::brew style $f"
            brew style --display-cop-names "$f"
            echo "::endgroup::"
          done

      - name: brew audit --new-formula --online
        run: |
          for f in Formula/*.rb; do
            echo "::group::brew audit $f"
            # --new-formula: full strict rule set appropriate for a brand-new
            #               formula in a third-party tap.
            # --online:      follow URLs and verify SHA256 matches live files.
            brew audit --new-formula --online "$f"
            echo "::endgroup::"
          done

  install-and-test:
    name: Build from source + brew test
    runs-on: macos-latest
    timeout-minutes: 30
    # Only run the expensive build on PRs and manual dispatches. On push
    # to `main` we trust that the formula already passed via PR CI.
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Checkout tap
        uses: actions/checkout@v4

      - name: Install each formula from source and run its test block
        run: |
          for f in Formula/*.rb; do
            name="$(basename "$f" .rb)"
            echo "::group::brew install --build-from-source $name"
            brew install --build-from-source --verbose "./$f"
            echo "::endgroup::"

            echo "::group::brew test $name"
            brew test --verbose "$name"
            echo "::endgroup::"

            brew uninstall --force "$name" || true
          done
