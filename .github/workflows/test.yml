name: brew test-bot

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: brew-${{ github.ref }}
  cancel-in-progress: true

# The tap is symlinked into Homebrew's tap cache so `brew` commands can
# resolve `armelingu/tap` normally.
jobs:
  lint-and-audit:
    name: Style + audit
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          path: homebrew-tap

      - name: Register checkout as the armelingu/tap Homebrew tap
        run: |
          taps_root="$(brew --repository)/Library/Taps/armelingu"
          mkdir -p "$taps_root"
          # `setup-homebrew` may have pre-created an empty directory
          # when it saw the tap name referenced. Wipe it so the
          # symlink can take its place.
          rm -rf "$taps_root/homebrew-tap"
          ln -s "$GITHUB_WORKSPACE/homebrew-tap" "$taps_root/homebrew-tap"
          brew tap
          ls -la "$taps_root/homebrew-tap/Formula"

      - name: brew style
        run: brew style --display-cop-names armelingu/tap

      - name: brew audit (new + online)
        # --new implies --strict --online and enables the full set of
        # "is this formula ready to be accepted upstream?" rules.
        run: brew audit --new --online --tap=armelingu/tap

  install-and-test:
    name: Build from source + brew test
    runs-on: macos-latest
    timeout-minutes: 30
    # Only run the expensive build on PRs and manual dispatches. On push
    # to `main` we trust that the formula already passed via PR CI.
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          path: homebrew-tap

      - name: Register checkout as the armelingu/tap Homebrew tap
        run: |
          taps_root="$(brew --repository)/Library/Taps/armelingu"
          mkdir -p "$taps_root"
          rm -rf "$taps_root/homebrew-tap"
          ln -s "$GITHUB_WORKSPACE/homebrew-tap" "$taps_root/homebrew-tap"

      - name: Install each tap formula from source and run its test block
        run: |
          for f in "$GITHUB_WORKSPACE/homebrew-tap"/Formula/*.rb; do
            name="$(basename "$f" .rb)"
            echo "::group::brew install --build-from-source armelingu/tap/$name"
            brew install --build-from-source --verbose "armelingu/tap/$name"
            echo "::endgroup::"

            echo "::group::brew test $name"
            brew test --verbose "$name"
            echo "::endgroup::"

            brew uninstall --force "$name" || true
          done
